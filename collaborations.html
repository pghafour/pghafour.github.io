<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collaborations | P.Ghafour</title>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/style.css" />
</head>

<body>

    <!-- Header -->
    <div id="header-placeholder"></div>
    <script>
        fetch("assets/includes/header.html")
            .then(res => res.text())
            .then(data => document.getElementById("header-placeholder").innerHTML = data);
    </script>

    <!-- 3‑COLUMN LAYOUT -->
    <div class="main-container">

        <!-- LEFT SIDEBAR -->
        <aside class="sidebar-left">
            <div id="left-sidebar-placeholder"></div>

            <script>
                fetch("assets/includes/sidebar-left.html")
                    .then(res => res.text())
                    .then(data => {
                        document.getElementById("left-sidebar-placeholder").innerHTML = data;

                        const current = window.location.pathname.split("/").pop();
                        const links = document.querySelectorAll(".menu-item a");

                        links.forEach(link => {
                            const page = link.getAttribute("href");
                            link.classList.remove("active-page");
                            if (page === current) {
                                link.classList.add("active-page");
                            }
                        });

                        if (current === "" || current === "index.html") {
                            document.querySelector('.menu-item a[href="index.html"]').classList.add("active-page");
                        }
                    });
            </script>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="content">
            <h2 class="page-title">Collaborations</h2>

            <ul style="list-style-type: disc; padding-left: 20px; font-size: 1em;">

                <li>
                    <strong style="color: maroon;">Dr. Saeed Tavasoli</strong><br>
                    <span style="font-size: 0.95em; color: #333;">
                        Kharazmi University, Tehran, Iran
                    </span><br>

                    <span style="font-size: 0.85em;">
                        <a href="mailto:tavasoli@ipm.ir" style="color: #0b4725; text-decoration: none;">Email</a> |
                        <a href="https://www.researchgate.net/profile/Saeed-Tavasoli" target="_blank" style="color: #0b4725; text-decoration: none;">ResearchGate</a> |
                        <a href="https://scholar.google.com/citations?user=BcoHAx0AAAAJ&hl=en" target="_blank" style="color: #0b4725; text-decoration: none;">GoogleScholar</a>
                    </span>
                </li>

            </ul>
        </main>

        <!-- RIGHT SIDEBAR -->
        <aside class="sidebar-right">
            <div id="right-sidebar-placeholder"></div>

            <script>
                fetch("assets/includes/sidebar-right.html")
                    .then(res => res.text())
                    .then(data => document.getElementById("right-sidebar-placeholder").innerHTML = data);
            </script>
        </aside>

    </div>

</body>
</html>
